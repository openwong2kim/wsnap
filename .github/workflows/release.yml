name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained single-file exe
        run: >
          dotnet publish Wsnap.csproj -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish

      # --- Code signing (SignPath) — only runs once SIGNPATH_ORGANIZATION_ID is set ---
      # Sign the exe BEFORE the installer is built, so the installer embeds the signed exe.
      # Until SignPath is configured (vars/secrets empty) every signing step is skipped and
      # the release ships unsigned exactly as before.
      - name: Upload unsigned exe (for signing)
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        id: upload-exe
        uses: actions/upload-artifact@v4
        with:
          name: wsnap-exe-unsigned
          path: publish/wsnap.exe

      - name: Sign exe (SignPath)
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG || 'wsnap' }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG || 'release-signing' }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIG_EXE || 'exe' }}
          github-artifact-id: ${{ steps.upload-exe.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: publish   # overwrites publish/wsnap.exe with the signed one

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          if (-not $ver) { $ver = '1.0.1' }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=$ver" installer.iss

      - name: Upload unsigned installer (for signing)
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        id: upload-installer
        uses: actions/upload-artifact@v4
        with:
          name: wsnap-installer-unsigned
          path: dist/wsnap-setup-*.exe

      - name: Sign installer (SignPath)
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG || 'wsnap' }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG || 'release-signing' }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIG_INSTALLER || 'installer' }}
          github-artifact-id: ${{ steps.upload-installer.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist     # overwrites dist/wsnap-setup-*.exe with the signed one

      - name: Package portable zip + checksums
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith('v')) { $tag = 'v1.0.0' }
          Compress-Archive -Path publish\wsnap.exe -DestinationPath "wsnap-$tag-win-x64.zip" -Force
          (Get-FileHash publish\wsnap.exe -Algorithm SHA256).Hash + "  wsnap.exe" | Out-File SHA256SUMS.txt -Encoding ascii
          if (Test-Path dist) { Get-ChildItem dist\*.exe | ForEach-Object { ((Get-FileHash $_.FullName -Algorithm SHA256).Hash + "  " + $_.Name) | Out-File SHA256SUMS.txt -Append -Encoding ascii } }

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            publish/wsnap.exe
            wsnap-*-win-x64.zip
            dist/wsnap-setup-*.exe
            SHA256SUMS.txt
